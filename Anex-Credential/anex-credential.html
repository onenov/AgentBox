<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anex Credential Encoder</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #171a20;
        --muted: #667085;
        --border: #d8dde8;
        --accent: #2563eb;
        --accent-text: #ffffff;
        --danger: #b42318;
        --success: #067647;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #101318;
          --panel: #171b22;
          --text: #f2f4f7;
          --muted: #98a2b3;
          --border: #2f3745;
          --accent: #60a5fa;
          --accent-text: #08111f;
          --danger: #f97066;
          --success: #32d583;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(880px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.1;
      }

      h2 {
        font-size: 18px;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 20px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 14px;
        font-weight: 650;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font: inherit;
        line-height: 1.5;
        outline: none;
        padding: 11px 12px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .segmented.compact {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .segmented input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segmented span {
        display: grid;
        min-height: 42px;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        padding: 0 10px;
      }

      .segmented input:checked + span {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 16%, transparent);
        color: var(--text);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .two-column {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: var(--accent-text);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 42px;
        padding: 0 16px;
      }

      button.secondary {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
      }

      code {
        border-radius: 6px;
        background: color-mix(in srgb, var(--muted) 14%, transparent);
        padding: 2px 6px;
      }

      .status {
        min-height: 24px;
        font-size: 14px;
        line-height: 1.6;
      }

      .status.success {
        color: var(--success);
      }

      .status.error {
        color: var(--danger);
      }

      @media (max-width: 560px) {
        main {
          padding: 28px 0;
        }

        .two-column,
        .segmented {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="grid">
      <header>
        <h1>Anex 凭据生成器</h1>
        <p>格式：<code>anex:&lt;base64url(backendAddress + "\n" + token)&gt;-aa</code> / <code>-ao</code> / <code>-ah</code> / <code>-ac</code></p>
      </header>

      <section class="panel grid" aria-labelledby="encode-title">
        <div>
          <h2 id="encode-title">生成凭据</h2>
          <p>填写后端地址和 Token，选择目标模块后生成可以直接粘贴到登录页的访问凭据。</p>
        </div>

        <div class="field">
          <label for="backend-address">backendAddress</label>
          <input id="backend-address" autocomplete="url" value="http://127.0.0.1:8787" />
        </div>

        <div class="field">
          <label for="token">token</label>
          <input id="token" autocomplete="current-password" value="" />
        </div>

        <div class="field">
          <label>target</label>
          <div class="segmented" role="radiogroup" aria-label="目标模块">
            <label>
              <input name="target" type="radio" value="a" checked />
              <span>全部 -aa</span>
            </label>
            <label>
              <input name="target" type="radio" value="o" />
              <span>OpenClaw -ao</span>
            </label>
            <label>
              <input name="target" type="radio" value="h" />
              <span>Hermes -ah</span>
            </label>
            <label>
              <input name="target" type="radio" value="c" />
              <span>CC-Connect -ac</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label for="credential">credential</label>
          <textarea id="credential" readonly></textarea>
        </div>

        <div class="two-column">
          <div class="field">
            <label for="login-url-base">login URL</label>
            <input id="login-url-base" autocomplete="url" value="http://localhost:5122/login" />
          </div>

          <div class="field">
            <label>persistence</label>
            <div class="segmented compact" role="radiogroup" aria-label="登录持久化">
              <label>
                <input name="persistence" type="radio" value="persistent" checked />
                <span>持久化</span>
              </label>
              <label>
                <input name="persistence" type="radio" value="session" />
                <span>仅会话</span>
              </label>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="login-link">login link</label>
          <textarea id="login-link" readonly></textarea>
        </div>

        <div class="actions">
          <button id="encode-button" type="button">生成</button>
          <button id="copy-button" class="secondary" type="button">复制结果</button>
          <button id="copy-login-link-button" class="secondary" type="button">复制登录链接</button>
          <button id="open-login-link-button" class="secondary" type="button">打开登录链接</button>
        </div>

        <div id="encode-status" class="status" role="status"></div>
      </section>

      <section class="panel grid" aria-labelledby="decode-title">
        <div>
          <h2 id="decode-title">解析验证</h2>
          <p>粘贴 <code>anex:xxx-aa</code>、<code>anex:xxx-ao</code>、<code>anex:xxx-ah</code> 或 <code>anex:xxx-ac</code>，检查里面携带的后端地址、Token 和目标模块。</p>
        </div>

        <div class="field">
          <label for="decode-input">credential</label>
          <textarea id="decode-input"></textarea>
        </div>

        <div class="actions">
          <button id="decode-button" class="secondary" type="button">解析</button>
        </div>

        <div class="field">
          <label for="decode-output">result</label>
          <textarea id="decode-output" readonly></textarea>
        </div>

        <div id="decode-status" class="status" role="status"></div>
      </section>
    </main>

    <script>
      const PREFIX = "anex:";
      const VERSION = "a";
      const TARGETS = {
        a: "all",
        o: "openclaw",
        h: "hermes",
        c: "cc-connect",
      };

      const backendAddressInput = document.querySelector("#backend-address");
      const tokenInput = document.querySelector("#token");
      const credentialOutput = document.querySelector("#credential");
      const loginURLBaseInput = document.querySelector("#login-url-base");
      const loginLinkOutput = document.querySelector("#login-link");
      const decodeInput = document.querySelector("#decode-input");
      const decodeOutput = document.querySelector("#decode-output");
      const encodeStatus = document.querySelector("#encode-status");
      const decodeStatus = document.querySelector("#decode-status");

      function selectedTarget() {
        return document.querySelector('input[name="target"]:checked')?.value || "o";
      }

      function selectedPersistence() {
        return document.querySelector('input[name="persistence"]:checked')?.value || "persistent";
      }

      function encodeCredential(backendAddress, token, target) {
        const payload = `${backendAddress.trim()}\n${token.trim()}`;
        return `${PREFIX}${toBase64Url(payload)}-${VERSION}${target}`;
      }

      function buildLoginLink(baseURL, credential, persistence) {
        const normalizedBaseURL = baseURL.trim() || "http://localhost:5122/login";
        const url = new URL(normalizedBaseURL, window.location.href);
        url.searchParams.set("credential", credential);
        url.searchParams.set("persistence", persistence);
        return url.toString();
      }

      function decodeCredential(credential) {
        const match = credential.trim().match(/^anex:(.+)-([a-z]{2})$/i);
        if (!match) {
          throw new Error("凭据格式不正确，应为 anex:xxx-aa、anex:xxx-ao、anex:xxx-ah 或 anex:xxx-ac。");
        }

        const [, payload, suffix] = match;
        const normalizedSuffix = suffix.toLowerCase();
        const version = normalizedSuffix.slice(0, 1);
        const targetKey = normalizedSuffix.slice(1);
        if (version !== VERSION) {
          throw new Error(`暂不支持 -${suffix} 版本。`);
        }
        if (!TARGETS[targetKey]) {
          throw new Error(`暂不支持 -${suffix} 目标模块。`);
        }

        const decoded = fromBase64Url(payload);
        const separatorIndex = decoded.indexOf("\n");
        if (separatorIndex < 0) {
          throw new Error("凭据内容缺少后端地址或 Token。");
        }

        return {
          backendAddress: decoded.slice(0, separatorIndex),
          token: decoded.slice(separatorIndex + 1),
          suffix: `-${normalizedSuffix}`,
          target: TARGETS[targetKey],
          version,
        };
      }

      function toBase64Url(value) {
        const bytes = new TextEncoder().encode(value);
        let binary = "";
        for (let index = 0; index < bytes.length; index += 0x8000) {
          const chunk = bytes.subarray(index, index + 0x8000);
          binary += String.fromCharCode(...chunk);
        }
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function fromBase64Url(value) {
        const padded = value.replace(/-/g, "+").replace(/_/g, "/").padEnd(Math.ceil(value.length / 4) * 4, "=");
        const binary = atob(padded);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return new TextDecoder().decode(bytes);
      }

      function setStatus(element, message, type) {
        element.textContent = message;
        element.className = `status ${type || ""}`.trim();
      }

      function generate() {
        const backendAddress = backendAddressInput.value.trim();
        const token = tokenInput.value.trim();
        const target = selectedTarget();
        const persistence = selectedPersistence();
        if (!backendAddress || !token) {
          credentialOutput.value = "";
          loginLinkOutput.value = "";
          setStatus(encodeStatus, "请填写 backendAddress 和 token。", "error");
          return;
        }

        const credential = encodeCredential(backendAddress, token, target);
        credentialOutput.value = credential;
        loginLinkOutput.value = buildLoginLink(loginURLBaseInput.value, credential, persistence);
        decodeInput.value = credential;
        setStatus(encodeStatus, `已生成 ${TARGETS[target]} 凭据。`, "success");
      }

      async function copyCredential() {
        if (!credentialOutput.value) generate();
        if (!credentialOutput.value) return;
        await copyText(credentialOutput.value);
        setStatus(encodeStatus, "已复制凭据到剪贴板。", "success");
      }

      async function copyLoginLink() {
        if (!loginLinkOutput.value) generate();
        if (!loginLinkOutput.value) return;
        await copyText(loginLinkOutput.value);
        setStatus(encodeStatus, "已复制登录链接到剪贴板。", "success");
      }

      async function copyText(value) {
        try {
          await navigator.clipboard.writeText(value);
        } catch {
          const fallback = document.createElement("textarea");
          fallback.value = value;
          fallback.style.position = "fixed";
          fallback.style.opacity = "0";
          document.body.appendChild(fallback);
          fallback.select();
          document.execCommand("copy");
          fallback.remove();
        }
      }

      function openLoginLink() {
        if (!loginLinkOutput.value) generate();
        if (!loginLinkOutput.value) return;
        window.open(loginLinkOutput.value, "_blank", "noopener,noreferrer");
      }

      function refreshGeneratedOutput() {
        if (backendAddressInput.value.trim() && tokenInput.value.trim()) {
          generate();
        }
      }

      function decode() {
        try {
          const result = decodeCredential(decodeInput.value);
          decodeOutput.value = JSON.stringify(result, null, 2);
          setStatus(decodeStatus, "解析成功。", "success");
        } catch (error) {
          decodeOutput.value = "";
          setStatus(decodeStatus, error instanceof Error ? error.message : "解析失败。", "error");
        }
      }

      document.querySelector("#encode-button").addEventListener("click", generate);
      document.querySelector("#copy-button").addEventListener("click", copyCredential);
      document.querySelector("#copy-login-link-button").addEventListener("click", copyLoginLink);
      document.querySelector("#open-login-link-button").addEventListener("click", openLoginLink);
      document.querySelector("#decode-button").addEventListener("click", decode);
      backendAddressInput.addEventListener("input", generate);
      tokenInput.addEventListener("input", generate);
      loginURLBaseInput.addEventListener("input", refreshGeneratedOutput);
      document.querySelectorAll('input[name="target"]').forEach((input) => {
        input.addEventListener("change", generate);
      });
      document.querySelectorAll('input[name="persistence"]').forEach((input) => {
        input.addEventListener("change", refreshGeneratedOutput);
      });
    </script>
  </body>
</html>
